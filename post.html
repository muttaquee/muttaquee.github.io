<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Muttaquee</title>
  <meta name="description" content="A weekly note by Muttaquee on AI-driven MetaHumans and immersive brand engagement." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="fonts.css?v=9" />
  <link rel="stylesheet" href="style.css?v=32" />
</head>
<body>
  <!-- water ripple background (canvas simulation) -->
  <canvas class="ripple-canvas" aria-hidden="true"></canvas>

  <!-- NAV -->
  <header class="nav">
    <a href="index.html" class="brand">Muttaquee<span class="dot">.</span></a>
    <nav class="nav-links">
      <a href="index.html#about">About</a>
      <a href="index.html#research">Research</a>
      <a href="index.html#publications">Publications</a>
      <a href="blog.html" class="active">Blog</a>
      <a href="index.html#contact">Contact</a>
    </nav>
  </header>

  <!-- ARTICLE -->
  <article class="section post">
    <a href="blog.html" class="post-back">← All posts</a>
    <div class="post-meta" id="post-meta"></div>
    <div class="post-body" id="post-body">
      <p class="muted">Loading…</p>
    </div>
  </article>

  <footer class="footer">
    <p>© <span id="year"></span> Muttaquee · AI-Driven MetaHumans for Immersive Brand Engagement</p>
  </footer>

  <script src="assets/marked.min.js"></script>
  <script src="script.js?v=14" defer></script>
  <script>
    (async function renderPost() {
      const body = document.getElementById("post-body");
      const metaEl = document.getElementById("post-meta");
      // query param survives the GitHub OAuth redirect (hash does not); fall back to hash for old links
      const slug = new URLSearchParams(location.search).get("slug") || decodeURIComponent(location.hash.slice(1));
      if (!slug || !/^[a-z0-9-]+$/i.test(slug)) {
        body.innerHTML = '<p class="muted">Post not found. <a href="blog.html">Back to blog</a>.</p>';
        return;
      }
      try {
        // post meta from the index
        const idx = await (await fetch("posts/index.json?cb=" + Date.now())).json();
        const meta = idx.find((p) => p.slug === slug);
        let titleHtml = "";
        if (meta) {
          document.title = meta.title + " — Muttaquee";
          const d = new Date(meta.date + "T00:00:00");
          const date = d.toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
          const tags = (meta.tags || []).map((t) => `<span class="blog-tag">${t}</span>`).join("");
          metaEl.innerHTML = `<time>${date}</time>${tags}`;
          titleHtml = `<h1>${meta.title}</h1>`;
        }
        // body comes from the index (embedded; avoids the Jekyll .md 404)
        const md = (meta && meta.body) || "";
        const cover = meta && meta.cover ? `<img class="post-cover" src="${meta.cover}" alt="" />` : "";
        const video = meta && meta.video ? `<video class="post-video" src="${meta.video}" controls playsinline></video>` : "";
        const link = location.origin + "/p/" + slug + ".html";
        const u = encodeURIComponent(link), t = encodeURIComponent((meta && meta.title) || "");
        const share = `<div class="post-share">
          <span class="post-share-label">Share</span>
          <a class="share-btn" href="https://www.linkedin.com/sharing/share-offsite/?url=${u}" target="_blank" rel="noopener" aria-label="Share on LinkedIn">in</a>
          <a class="share-btn" href="https://www.facebook.com/sharer/sharer.php?u=${u}" target="_blank" rel="noopener" aria-label="Share on Facebook">f</a>
          <a class="share-btn" href="https://twitter.com/intent/tweet?url=${u}&text=${t}" target="_blank" rel="noopener" aria-label="Share on X">𝕏</a>
          <a class="share-btn" href="https://wa.me/?text=${t}%20${u}" target="_blank" rel="noopener" aria-label="Share on WhatsApp">✆</a>
          <button class="share-btn share-copy" type="button" data-url="${link}" aria-label="Copy link">⧉ Copy</button>
        </div>`;
        body.innerHTML = titleHtml + cover + video + marked.parse(md) + share +
          `<div class="post-comments"><h3 class="post-comments-title">💬 Comments &amp; reactions</h3></div>`;
        body.addEventListener("click", (e) => {
          const c = e.target.closest(".share-copy");
          if (!c) return;
          navigator.clipboard?.writeText(c.dataset.url);
          const old = c.textContent; c.textContent = "Copied ✓";
          setTimeout(() => (c.textContent = old), 1500);
        });
        // Giscus comments + reactions, mapped to this post's slug
        const g = document.createElement("script");
        const attrs = {
          src: "https://giscus.app/client.js",
          "data-repo": "muttaquee/muttaquee.github.io",
          "data-repo-id": "R_kgDOTDXe2A",
          "data-category": "Announcements",
          "data-category-id": "DIC_kwDOTDXe2M4C_6Is",
          "data-mapping": "specific",
          "data-term": slug,
          "data-strict": "1",
          "data-reactions-enabled": "1",
          "data-emit-metadata": "0",
          "data-input-position": "bottom",
          "data-theme": "light",
          "data-lang": "en",
          crossorigin: "anonymous",
        };
        Object.entries(attrs).forEach(([k, v]) => g.setAttribute(k, v));
        g.async = true;
        document.querySelector(".post-comments").appendChild(g);
      } catch (e) {
        body.innerHTML = '<p class="muted">Could not load this post. <a href="blog.html">Back to blog</a>.</p>';
      }
    })();
  </script>
</body>
</html>
